version: '3.8'

services:
  ai-nn-website:
    build: .
    container_name: ai-nn-website
    restart: always
    networks:
      - platform-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ainn.rule=Host(`ai-nn.kampuz.kz`)"
      - "traefik.http.routers.ainn.service=ainn"
      - "traefik.http.services.ainn.loadbalancer.server.port=80"
      - "traefik.docker.network=platform-net"

networks:
  platform-net:
    external: true
